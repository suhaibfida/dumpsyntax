name: Continuous Deployment Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 3 — Enable Corepack (pnpm version from package.json)
      - name: Enable corepack
        run: corepack enable

      # Step 4 — Install dependencies
      - name: Install dependencies
        run: pnpm install

      # Step 5 — Build backend services only
      - name: Build API and socket server
        run: |
          pnpm turbo run build --filter=api
          pnpm turbo run build --filter=socket-server
