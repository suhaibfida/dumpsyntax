name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      # Step 3 — Enable Corepack (pnpm)
      - name: Enable corepack
        run: corepack enable

      # Step 4 — Install dependencies
      - name: Install dependencies
        run: pnpm install

      # Step 5 — Generate prisma client
      - name: Generate prisma client
        run: pnpm --filter=@repo/db exec prisma generate

      # Step 6 — Build backend services only
      - name: Build API and socket server
        run: pnpm turbo run build --filter=@repo/api --filter=@repo/socket-server

      # Step 7 — Deploy to EC2
      - name: Deploy backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/dumpsyntax
            git fetch origin
            git reset --hard origin/main
            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh
            pnpm install
            pnpm --filter=@repo/db exec prisma generate
            pnpm turbo run build --filter=@repo/api --filter=@repo/socket-server

            export PORT=4000
            export FRONTEND_URL=https://dumpsyntax.suhaibfida.dev
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export DATABASE_URL=${{ secrets.DATABASE_URL }}

            pm2 reload api --update-env || pm2 start apps/api/dist/main.js -i 2 --name api

            export PORT=4001
            export FRONTEND_URL=https://dumpsyntax.suhaibfida.dev
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export DATABASE_URL=${{ secrets.DATABASE_URL }}

            pm2 reload socket-server --update-env || pm2 start apps/socket-server/dist/main.js --name socket-server
            pm2 save
            pm2 list
